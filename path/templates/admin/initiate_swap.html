{% extends 'admin_base.html' %}

{% block content %}
<div class="container-fluid p-4">
    <div class="d-flex justify-content-between align-items-center mb-4">
        <h2>Admin Course Swap</h2>
        <a href="{% url 'swap_history' %}" class="btn btn-outline-secondary">
            <i class="fas fa-history me-2"></i> View Swap History
        </a>
    </div>
    
    {% if messages %}
    <div class="mb-4">
        {% for message in messages %}
        <div class="alert alert-{{ message.tags }} alert-dismissible fade show">
            {{ message }}
            <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
        </div>
        {% endfor %}
    </div>
    {% endif %}
    
    <div class="card shadow-sm">
        <div class="card-body">
            <form method="post">
                {% csrf_token %}
                <div class="row mb-3">
                    <div class="col-md-6">
                        <label class="form-label">First Student Admission Number</label>
                        <input type="text" name="student1_admission" class="form-control" 
                               placeholder="Enter admission number" required>
                    </div>
                    <div class="col-md-6">
                        <label class="form-label">Second Student Admission Number</label>
                        <input type="text" name="student2_admission" class="form-control" 
                               placeholder="Enter admission number" required>
                    </div>
                </div>
                
                <div class="text-center mt-4">
                    <button type="submit" class="btn btn-primary">
                        <i class="fas fa-search me-2"></i> Find Students
                    </button>
                </div>
            </form>
        </div>
    </div>
</div>
{% endblock %}
