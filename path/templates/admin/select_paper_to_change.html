{% extends 'admin_base.html' %}

{% block content %}
<div class="container-fluid p-4">
    <h2 class="mb-4">Select Paper to Change for {{ student.name }}</h2>
    
    <div class="card shadow-sm">
        <div class="card-body">
            <form method="post" action="{% url 'select_new_course' %}">
                {% csrf_token %}
                <input type="hidden" name="student_id" value="{{ student.id }}">
                
                <div class="mb-3">
                    <label class="form-label">Select Paper to Change:</label>
                    <div class="list-group">
                        {% for course in current_courses %}
                        <button type="submit" name="paper_no" value="{{ course.paper_no }}" 
                                class="list-group-item list-group-item-action d-flex justify-content-between align-items-center">
                            <div>
                                <strong>Paper {{ course.paper_no }}:</strong> 
                                {{ course.batch.course.course_name }} ({{ course.batch }})
                            </div>
                            <span class="badge bg-primary rounded-pill">
                                {{ course.batch.seats_taken }}/{{ course.batch.course.seat_limit }}
                            </span>
                        </button>
                        {% endfor %}
                    </div>
                </div>
            </form>
        </div>
    </div>
</div>
{% endblock %}
